<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Моя интерактивная страница</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Форма с полями ввода -->
  <form id="profileForm">
    <div class="form-group">
      <label for="name">Имя</label>
      <input type="text" id="name" placeholder="Полное имя, как оно указано в статьях">
      <button type="button" class="add-name">+ Добавить имя</button>
    </div>

    <div class="form-group">
      <label for="work">Место работы</label>
      <input type="text" id="work" placeholder="Пример: профессор математики, МГУ им. Ломоносова">
    </div>

    <div class="form-group">
      <label for="email">Электронная почта для подтверждения</label>
      <input type="email" id="email" placeholder="Пример: kolmogorov@msu.ru">
    </div>

    <div class="form-group">
      <label for="interests">Области интересов</label>
      <input type="text" id="interests" placeholder="Пример: топология, турбулентность, функциональный анализ">
    </div>

    <div class="form-group">
      <label for="website">Личная страница (необязательно)</label>
      <input type="url" id="website" placeholder="Пример: http://www.msu.ru/~kolmogorov">
    </div>

    <button type="submit">ДАЛЕЕ</button>
  </form>

  <!-- Блоки Vue.js -->
  <div id="app">
    <div v-for="(color, index) in colors" :key="index"
         class="color-block"
         :style="{ backgroundColor: color }"
         @click="changeColor(index)">
      {{ color }}
    </div>
  </div>

  <!-- Подключаем библиотеку Vue.js и наш скрипт -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="script.js"></script>
</body>
</html>
