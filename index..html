<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои задания</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f0f2f5;
        }
        .block {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        button {
            background: blue;
            color: white;
            padding: 8px 15px;
            border: none;
            cursor: pointer;
        }
        .color {
            width: 100px;
            height: 100px;
            display: inline-block;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- ЗАДАНИЕ 1 -->
<div class="block">
    <h2>1. Анкета</h2>
    <p>Имя:</p>
    <input type="text" id="nameInput" placeholder="Введите имя">
    <button onclick="addName()">+ Добавить имя</button>
    <div id="nameList"></div>
    
    <p>Место работы:</p>
    <input type="text" id="work" placeholder="Место работы">
    
    <p>Email:</p>
    <input type="email" id="email" placeholder="Email">
    
    <p>Интересы:</p>
    <textarea id="interests" rows="2"></textarea>
    
    <p>Сайт:</p>
    <input type="text" id="website">
    
    <br><br>
    <button onclick="nextStep()">ДАЛЕЕ</button>
</div>

<!-- ЗАДАНИЕ 2 -->
<div class="block">
    <h2>2. Найти блок с максимальной суммой</h2>
    <input type="text" id="digits" value="7210245011111111090">
    <button onclick="analyzeDigits()">Найти</button>
    <p id="digitResult"></p>
</div>

<!-- ЗАДАНИЕ 3 -->
<div class="block">
    <h2>3. Цветные квадраты</h2>
    <div id="vueApp">
        <div v-for="(color, i) in colors" :key="i">
            <div class="color" :style="{backgroundColor: color}" @click="changeColor(i)"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
    // ЗАДАНИЕ 1
    let names = [];
    
    function addName() {
        let input = document.getElementById('nameInput');
        let name = input.value.trim();
        if (name) {
            names.push(name);
            let container = document.getElementById('nameList');
            container.innerHTML = '';
            for (let i = 0; i < names.length; i++) {
                let tag = document.createElement('span');
                tag.innerHTML = names[i] + ' ';
                tag.style.background = 'blue';
                tag.style.color = 'white';
                tag.style.padding = '5px 10px';
                tag.style.margin = '5px';
                tag.style.display = 'inline-block';
                tag.style.borderRadius = '15px';
                container.appendChild(tag);
            }
            input.value = '';
        }
    }
    
    function nextStep() {
        alert('Данные сохранены!');
    }
    
    // ЗАДАНИЕ 2
    function findMaxBlock(str) {
        let blocks = str.split('0');
        let bestBlock = '';
        let bestSum = -1;
        
        for (let i = 0; i < blocks.length; i++) {
            let block = blocks[i];
            if (block.length === 0) continue;
            let sum = 0;
            for (let j = 0; j < block.length; j++) {
                sum += parseInt(block[j]);
            }
            if (sum > bestSum) {
                bestSum = sum;
                bestBlock = block;
            }
        }
        return {block: bestBlock, sum: bestSum};
    }
    
    function analyzeDigits() {
        let input = document.getElementById('digits').value;
        let result = findMaxBlock(input);
        if (result.block === '') {
            document.getElementById('digitResult').innerHTML = 'Нет блоков';
        } else {
            document.getElementById('digitResult').innerHTML = 'Блок: ' + result.block + '<br>Сумма: ' + result.sum;
        }
    }
    
    // ЗАДАНИЕ 3
    const app = Vue.createApp({
        data() {
            return {
                colors: ['red', 'green', 'blue', 'yellow', 'purple']
            }
        },
        methods: {
            changeColor(i) {
                let r = Math.floor(Math.random() * 255);
                let g = Math.floor(Math.random() * 255);
                let b = Math.floor(Math.random() * 255);
                this.colors[i] = 'rgb(' + r + ',' + g + ',' + b + ')';
            }
        }
    });
    app.mount('#vueApp');
</script>

</body>
</html>
