<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Три задания: форма + анализ цифр + цветные квадраты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Карточки заданий */
        .task-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .task-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        /* Задание 1: Форма */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .name-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .name-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .name-tag {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .name-tag .remove {
            cursor: pointer;
            font-weight: bold;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #48bb78;
        }

        .btn-secondary:hover {
            background: #38a169;
        }

        /* Задание 2: Анализ цифр */
        .digit-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: monospace;
            margin-bottom: 15px;
        }

        .result {
            background: #f0fdf4;
            border-left: 4px solid #48bb78;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
        }

        /* Задание 3: Цветные квадраты */
        .colors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .color-block {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .color-block:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .feedback {
            margin-top: 15px;
            padding: 10px;
            background: #e6f7ff;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ЗАДАНИЕ 1: ФОРМА -->
        <div class="task-card">
            <div class="task-title">📝 Задание 1: Анкета</div>
            
            <div class="name-section">
                <label style="display: block; margin-bottom: 10px; font-weight: 600;">Имя (как в статьях)</label>
                <input type="text" id="nameInput" placeholder="Введите полное имя" style="width: 70%; margin-right: 10px;">
                <button class="btn btn-secondary" onclick="addName()">+ Добавить имя</button>
                <div id="nameList" class="name-list"></div>
            </div>

            <div class="form-group">
                <label>Место работы</label>
                <input type="text" id="workPlace" placeholder="Пример: профессор математики, МГУ им. Ломоносова">
            </div>

            <div class="form-group">
                <label>Электронная почта для подтверждения</label>
                <input type="email" id="email" placeholder="Пример: kolmogorov@msu.ru">
            </div>

            <div class="form-group">
                <label>Области интересов</label>
                <textarea id="interests" placeholder="Пример: топология, турбулентность, функциональный анализ"></textarea>
            </div>

            <div class="form-group">
                <label>Личная страница (необязательно)</label>
                <input type="url" id="website" placeholder="Пример: http://www.msu.ru/~kolmogorov">
            </div>

            <button class="btn" onclick="submitForm()">ДАЛЕЕ</button>
            <div id="feedback" class="feedback"></div>
        </div>

        <!-- ЗАДАНИЕ 2: АНАЛИЗ БЛОКОВ ЦИФР -->
        <div class="task-card">
            <div class="task-title">🔢 Задание 2: Анализ блоков цифр</div>
            <p style="margin-bottom: 15px; color: #666;">Введите строку из цифр 0-9. Блоки разделяются нулями.</p>
            <input type="text" id="digitString" class="digit-input" placeholder="Пример: 7210245011111111090" value="7210245011111111090">
            <button class="btn" onclick="analyzeDigits()">Найти блок с максимальной суммой</button>
            <div id="digitResult" class="result">
                Результат появится здесь...
            </div>
        </div>

        <!-- ЗАДАНИЕ 3: ЦВЕТНЫЕ КВАДРАТЫ НА VUE.JS -->
        <div class="task-card">
            <div class="task-title">🎨 Задание 3: Цветные квадраты (Vue.js)</div>
            <p style="margin-bottom: 15px; color: #666;">Кликните на квадрат, чтобы изменить его цвет на случайный.</p>
            <div id="vue-app">
                <div class="colors-grid">
                    <div 
                        v-for="(item, index) in colors" 
                        :key="index"
                        class="color-block"
                        :style="{ backgroundColor: item.color }"
                        @click="changeColor(index)"
                    >
                        {{ item.name }}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        // ========== ЗАДАНИЕ 1: Логика формы ==========
        let namesArray = [];

        function renderNames() {
            const container = document.getElementById('nameList');
            container.innerHTML = '';
            if (namesArray.length === 0) {
                container.innerHTML = '<span style="color: #999;">Нет добавленных имён</span>';
                return;
            }
            namesArray.forEach((name, index) => {
                const tag = document.createElement('div');
                tag.className = 'name-tag';
                tag.innerHTML = `${name} <span class="remove" onclick="removeName(${index})">✖</span>`;
                container.appendChild(tag);
            });
        }

        function addName() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (name) {
                namesArray.push(name);
                renderNames();
                input.value = '';
            } else {
                alert('Введите имя');
            }
        }

        function removeName(index) {
            namesArray.splice(index, 1);
            renderNames();
        }

        function submitForm() {
            const workPlace = document.getElementById('workPlace').value;
            const email = document.getElementById('email').value;
            const interests = document.getElementById('interests').value;
            const website = document.getElementById('website').value;
            
            let namesText = namesArray.length > 0 ? namesArray.join(', ') : 'не указано';
            
            const feedback = document.getElementById('feedback');
            feedback.innerHTML = `
                ✅ <strong>Данные сохранены!</strong><br>
                📛 Имена: ${namesText}<br>
                🏢 Место работы: ${workPlace || 'не указано'}<br>
                📧 Email: ${email || 'не указан'}<br>
                🔬 Интересы: ${interests || 'не указаны'}<br>
                🌐 Сайт: ${website || 'не указан'}
            `;
            feedback.classList.add('show');
            
            setTimeout(() => {
                feedback.classList.remove('show');
            }, 5000);
        }

        // ========== ЗАДАНИЕ 2: Анализ блоков цифр ==========
        function findMaxSumBlock(str) {
            // Разделяем по нулям и фильтруем пустые блоки
            const blocks = str.split('0').filter(block => block.length > 0);
            
            if (blocks.length === 0) {
                return { block: '', maxSum: 0 };
            }
            
            let bestBlock = blocks[0];
            let bestSum = blocks[0].split('').reduce((a, b) => a + parseInt(b), 0);
            
            for (let i = 1; i < blocks.length; i++) {
                const sum = blocks[i].split('').reduce((a, b) => a + parseInt(b), 0);
                if (sum > bestSum) {
                    bestSum = sum;
                    bestBlock = blocks[i];
                }
            }
            
            return { block: bestBlock, maxSum: bestSum };
        }

        function analyzeDigits() {
            const input = document.getElementById('digitString').value;
            
            // Проверка: только цифры
            if (!/^[0-9]+$/.test(input)) {
                document.getElementById('digitResult').innerHTML = '❌ Ошибка: строка должна содержать только цифры 0-9';
                return;
            }
            
            const result = findMaxSumBlock(input);
            
            if (result.block === '') {
                document.getElementById('digitResult').innerHTML = '⚠️ В строке нет блоков (только нули или пустая строка)';
            } else {
                document.getElementById('digitResult').innerHTML = `
                    🏆 <strong>Блок с максимальной суммой:</strong> «${result.block}»<br>
                    📊 <strong>Сумма цифр:</strong> ${result.maxSum}<br>
                    <span style="font-size: 12px; color: #666;">Формат: блок, сумма (как в примере: 245, 11)</span>
                `;
            }
        }

        // ========== ЗАДАНИЕ 3: Vue.js приложение ==========
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                // Инициализация массива из 5 объектов с цветами
                const colors = ref([
                    { name: 'red', color: '#ef4444' },
                    { name: 'green', color: '#10b981' },
                    { name: 'blue', color: '#3b82f6' },
                    { name: 'yellow', color: '#f59e0b' },
                    { name: 'purple', color: '#8b5cf6' }
                ]);
                
                // Функция для генерации случайного цвета
                const getRandomColor = () => {
                    const letters = '0123456789ABCDEF';
                    let color = '#';
                    for (let i = 0; i < 6; i++) {
                        color += letters[Math.floor(Math.random() * 16)];
                    }
                    return color;
                };
                
                // Функция изменения цвета при клике
                const changeColor = (index) => {
                    colors.value[index].color = getRandomColor();
                };
                
                return {
                    colors,
                    changeColor
                };
            }
        }).mount('#vue-app');

        // Автоматически запускаем пример при загрузке
        window.addEventListener('DOMContentLoaded', () => {
            renderNames();
            analyzeDigits(); // Показать пример сразу
        });
    </script>
</body>
</html>
