<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма с Vue.js</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <form id="my-form">
      <div class="form-group">
        <label for="interests">Области интересов</label>
        <input type="text" id="interests" placeholder="Пример: топология, турбулентность, функциональный анализ">
      </div>
      <div class="form-group">
        <label for="website">Личная страница (необязательно)</label>
        <input type="url" id="website" placeholder="Пример: http://www.msu.ru/~kolmogorov">
      </div>
      <button type="submit">ДАЛЕЕ</button>
    </form>

    <!-- Блоки Vue.js -->
    <div id="app">
      <div 
        v-for="(color, index) in colors" 
        :key="index" 
        class="color-block" 
        :style="{ backgroundColor: color }" 
        @click="changeColor(index)"
      >
        {{ color }}
      </div>
    </div>

    <!-- Подключаем библиотеку Vue.js и наш скрипт -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="script.js"></script>
  </body>
</html>
