<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои задания</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #eef2ff;
        }
        
        .block {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }
        
        h2 {
            margin-top: 0;
            font-size: 20px;
        }
        
        input, textarea, button {
            margin: 5px 0 10px;
            padding: 8px;
        }
        
        input, textarea {
            width: 100%;
            max-width: 400px;
            border: 1px solid #aaa;
        }
        
        button {
            background: #4a90e2;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        button:hover {
            background: #357abd;
        }
        
        .name-tag {
            display: inline-block;
            background: #4a90e2;
            color: white;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 12px;
            font-size: 14px;
        }
        
        .color-square {
            width: 100px;
            height: 100px;
            margin: 10px;
            display: inline-block;
            border: 1px solid #888;
            cursor: pointer;
        }
        
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="block">
    <h2>Задание 1. Анкета</h2>
    
    <p><strong>Имя (как в статьях):</strong></p>
    <input type="text" id="nameInput" placeholder="Иванова Анна">
    <button onclick="addName()">+ Добавить имя</button>
    <div id="nameList"></div>
    
    <p><strong>Место работы:</strong></p>
    <input type="text" id="work" placeholder="МГУ им. Ломоносова">
    
    <p><strong>Email для подтверждения:</strong></p>
    <input type="email" id="email" placeholder="ivanova@msu.ru">
    
    <p><strong>Области интересов:</strong></p>
    <textarea id="interests" rows="2" placeholder="топология, турбулентность"></textarea>
    
    <p><strong>Личная страница:</strong></p>
    <input type="text" id="website" placeholder="http://example.com">
    
    <br>
    <button onclick="showForm()">ДАЛЕЕ</button>
</div>

<div class="block">
    <h2>Задание 2. Найти блок с максимальной суммой</h2>
    <p>Введите цифры (0 разделяет блоки):</p>
    <input type="text" id="digits" value="7210245011111111090">
    <button onclick="analyze()">Найти</button>
    <div id="resultBlock" class="result"></div>
</div>

<div class="block">
    <h2>Задание 3. Цветные квадраты</h2>
    <p>Кликни на квадрат — цвет изменится</p>
    <div id="vueApp">
        <div v-for="(c, i) in colorList" :key="i">
            <div class="color-square" :style="{backgroundColor: c}" @click="change(i)"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
   
    let nameList = [];
    
    function showNames() {
        let container = document.getElementById('nameList');
        container.innerHTML = '';
        for(let i = 0; i < nameList.length; i++) {
            let tag = document.createElement('span');
            tag.className = 'name-tag';
            tag.innerHTML = nameList[i];
            container.appendChild(tag);
        }
        if(nameList.length == 0) {
            container.innerHTML = 'Нет имён';
        }
    }
    
    function addName() {
        let input = document.getElementById('nameInput');
        let newName = input.value.trim();
        if(newName != '') {
            nameList.push(newName);
            showNames();
            input.value = '';
        }
    }
    
  function showForm() {
        alert('Спасибо, данные сохранены');
    }
    

    function getMaxBlock(str) {
        let parts = str.split('0');
        let best = '';
        let bestSum = -1;
        
        for(let i = 0; i < parts.length; i++) {
            let part = parts[i];
            if(part.length == 0) continue;
            
            let sum = 0;
            for(let j = 0; j < part.length; j++) {
                sum = sum + Number(part[j]);
            }
            
            if(sum > bestSum) {
                bestSum = sum;
                best = part;
            }
        }
        return {block: best, sum: bestSum};
    }
    
    function analyze() {
        let text = document.getElementById('digits').value;
        let res = getMaxBlock(text);
        let out = document.getElementById('resultBlock');
        
        if(res.block == '') {
            out.innerHTML = 'Нет блоков';
        } else {
            out.innerHTML = 'Блок: ' + res.block + '<br>Сумма: ' + res.sum;
        }
    }
    

    const app = Vue.createApp({
        data() {
            return {
                colorList: ['red', 'green', 'blue', 'yellow', 'purple']
            }
        },
        methods: {
            change(index) {
                let r = Math.random() * 255;
                let g = Math.random() * 255;
                let b = Math.random() * 255;
                this.colorList[index] = 'rgb(' + r + ',' + g + ',' + b + ')';
            }
        }
    });
    app.mount('#vueApp');
</script>

</body>
</html>
